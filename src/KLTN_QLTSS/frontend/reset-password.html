<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - TVU-ITAM</title>
    <meta name="description" content="Đặt lại mật khẩu - Hệ thống Quản lý Tài sản CNTT - Đại học Trà Vinh">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#DC2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TVU-ITAM">
    <link rel="apple-touch-icon" href="/assets/images/logo-tvu.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css?v=2">
</head>
<body class="login-body">
    <div class="login-anim-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="login-grid"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/images/logotvu.jpg" alt="Đại học Trà Vinh" class="login-logo">
                <div class="gov-label">Ủy ban nhân dân tỉnh Vĩnh Long</div>
                <div class="school-name">ĐẠI HỌC TRÀ VINH</div>
                <div class="school-name-sub">PHÒNG CÔNG NGHỆ THÔNG TIN</div>
                <div class="system-name">ĐẶT LẠI MẬT KHẨU</div>
            </div>

            <form id="resetForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="new_password">Mật khẩu mới</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>
                        <input type="password" id="new_password" placeholder="Tối thiểu 6 ký tự" required autocomplete="new-password" minlength="6">
                        <button type="button" class="toggle-password" id="togglePwd">
                            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>
                        <input type="password" id="confirm_password" placeholder="Nhập lại mật khẩu mới" required autocomplete="new-password" minlength="6">
                    </div>
                </div>
                <div id="resetError" class="alert-error" style="display:none"></div>
                <button type="submit" class="btn-login" id="resetBtn">
                    <span id="resetBtnText">Đặt lại mật khẩu</span>
                    <svg class="btn-spinner" id="resetSpinner" style="display:none" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.3"/>
                        <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="form-toggle">
                    <a href="/">Quay lại đăng nhập</a>
                </div>
            </form>
        </div>
        <p class="login-footer">© 2026 <a href="https://tvu.edu.vn" target="_blank">Đại học Trà Vinh</a> — Ban Công nghệ Thông tin (BCNTT)</p>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/reset-password.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js').catch(err => {
                console.error('SW registration failed:', err);
            });
        });
    }
    </script>
</body>
</html>
